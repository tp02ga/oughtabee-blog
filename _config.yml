# Site Settings
title: OughtaBee Blog
description: Insights for course creators on content, marketing, and automation
url: "https://blog.oughtabee.ai"
baseurl: ""

# Author
author:
  name: Trevor Page
  email: your-email@example.com

# Build settings
markdown: kramdown
permalink: /:title/

# Collections
collections:
  authors:
    output: true

# SEO Plugin
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Social (for SEO meta tags)
twitter:
  username: your_twitter_handle
social:
  name: OughtaBee
  links:
    - https://www.linkedin.com/company/oughtabee
    - https://twitter.com/your_handle

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "trevor"
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"

# Exclude from processing
exclude:
  - CLAUDE.md
